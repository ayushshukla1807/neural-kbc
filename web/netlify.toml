[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Disable experimental blobs that break local CLI builds
[context.production.environment]
  NETLIFY_BLOBS_CONTEXT = "skip"
